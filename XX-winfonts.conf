<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Windows 字体目录 -->
  <dir>/usr/share/fonts/WinFonts</dir>
  
  <!-- 基础渲染设置 - 优化中文显示 -->
  <match target="font">
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>  <!-- 改为 hintslight，避免过度 hinting -->
    </edit>
    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>
    <edit name="lcdfilter" mode="assign">
      <const>lcddefault</const>
    </edit>
    <edit name="embeddedbitmap" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="autohint" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <!-- 针对微软雅黑的特殊优化 -->
  <match target="font">
    <test name="family" compare="contains">
      <string>Microsoft YaHei</string>
    </test>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>  <!-- 微软雅黑使用轻度 hinting -->
    </edit>
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="embeddedbitmap" mode="assign">
      <bool>false</bool>  <!-- 禁用内嵌点阵 -->
    </edit>
    <!-- 添加字重修正 -->
    <edit name="weight" mode="assign">
      <const>regular</const>
    </edit>
  </match>

  <!-- 针对特定字号的微软雅黑优化 -->
  <match target="font">
    <test name="family" compare="contains">
      <string>Microsoft YaHei</string>
    </test>
    <test name="pixelsize" compare="more_eq">
      <double>12</double>
    </test>
    <test name="pixelsize" compare="less_eq">
      <double>18</double>
    </test>
    <edit name="hintstyle" mode="assign">
      <const>hintnone</const>  <!-- 中等字号禁用 hinting -->
    </edit>
  </match>

  <!-- 修复黑体显示过粗的问题 -->
  <match target="font">
    <test name="family" compare="contains">
      <string>SimHei</string>
    </test>
    <edit name="hintstyle" mode="assign">
      <const>hintnone</const>
    </edit>
    <edit name="weight" mode="assign">
      <const>regular</const>
    </edit>
  </match>

  <!-- 设置默认字体 - 调整优先级 -->
  <!-- Sans-serif 字体族 -->
  <alias binding="strong">
    <family>sans-serif</family>
    <prefer>
      <family>Segoe UI</family>
      <family>Microsoft YaHei UI</family>
      <family>Microsoft YaHei</family>
      <!-- 移除可能导致问题的字体 -->
      <family>Arial</family>
      <family>Tahoma</family>
    </prefer>
  </alias>

  <!-- Serif 字体族 -->
  <alias binding="strong">
    <family>serif</family>
    <prefer>
      <family>Times New Roman</family>
      <family>SimSun</family>
      <family>Georgia</family>
    </prefer>
  </alias>

  <!-- Monospace 字体族 -->
  <alias binding="strong">
    <family>monospace</family>
    <prefer>
      <family>Consolas</family>
      <family>Courier New</family>
      <family>NSimSun</family>  <!-- 使用新宋体而不是宋体 -->
    </prefer>
  </alias>

  <!-- 系统 UI 字体 -->
  <alias binding="strong">
    <family>system-ui</family>
    <prefer>
      <family>Segoe UI</family>
      <family>Microsoft YaHei UI</family>
    </prefer>
  </alias>

  <!-- 中文字体映射 - 简化并优化 -->
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-CN</string>
    </test>
    <test qual="any" name="family">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Microsoft YaHei</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-CN</string>
    </test>
    <test qual="any" name="family">
      <string>serif</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>SimSun</string>
    </edit>
  </match>

  <!-- 针对宋体的特殊处理 -->
  <match target="font">
    <test name="family" compare="contains">
      <string>SimSun</string>
    </test>
    <test name="pixelsize" compare="less_eq">
      <double>16</double>
    </test>
    <edit name="embeddedbitmap" mode="assign">
      <bool>true</bool>  <!-- 小字号启用点阵 -->
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintnone</const>
    </edit>
  </match>

  <match target="font">
    <test name="family" compare="contains">
      <string>SimSun</string>
    </test>
    <test name="pixelsize" compare="more">
      <double>16</double>
    </test>
    <edit name="embeddedbitmap" mode="assign">
      <bool>false</bool>  <!-- 大字号禁用点阵 -->
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
  </match>

  <!-- 字体别名映射 -->
  <alias binding="strong">
    <family>宋体</family>
    <accept><family>SimSun</family></accept>
  </alias>
  <alias binding="strong">
    <family>新宋体</family>
    <accept><family>NSimSun</family></accept>
  </alias>
  <alias binding="strong">
    <family>黑体</family>
    <accept><family>SimHei</family></accept>
  </alias>
  <alias binding="strong">
    <family>微软雅黑</family>
    <accept><family>Microsoft YaHei</family></accept>
  </alias>

  <!-- 英文字体别名 -->
  <alias binding="strong">
    <family>Arial</family>
    <default><family>sans-serif</family></default>
  </alias>
  <alias binding="strong">
    <family>Helvetica</family>
    <accept><family>Arial</family></accept>
  </alias>
  <alias binding="strong">
    <family>Times New Roman</family>
    <default><family>serif</family></default>
  </alias>
  <alias binding="strong">
    <family>Courier New</family>
    <default><family>monospace</family></default>
  </alias>

  <!-- 替换 Linux 默认字体 -->
  <match target="pattern">
    <test name="family">
      <string>Noto Sans CJK SC</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Microsoft YaHei</string>
    </edit>
  </match>

  <!-- 为浏览器优化 -->
  <match target="pattern">
    <test name="prgname" compare="eq">
      <string>firefox</string>
    </test>
    <test name="family" compare="contains">
      <string>Microsoft YaHei</string>
    </test>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
  </match>

  <match target="pattern">
    <test name="prgname" compare="contains">
      <string>chrome</string>
    </test>
    <test name="family" compare="contains">
      <string>Microsoft YaHei</string>
    </test>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
  </match>

  <!-- 全局字重修正 -->
  <match target="font">
    <test name="weight" compare="more">
      <const>medium</const>
    </test>
    <edit name="weight" mode="assign">
      <const>medium</const>
    </edit>
  </match>

  <!-- 确保特定字符不会过粗 -->
  <match target="font">
    <test name="family" compare="contains">
      <string>Microsoft YaHei</string>
    </test>
    <test name="weight" compare="eq">
      <const>bold</const>
    </test>
    <edit name="embolden" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <!-- 禁用人工加粗 -->
  <match target="font">
    <edit name="embolden" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <!-- 优化 LCD 滤镜 -->
  <match target="font">
    <test name="family" compare="contains">
      <string>Microsoft YaHei</string>
    </test>
    <edit name="lcdfilter" mode="assign">
      <const>lcdlight</const>  <!-- 使用轻度 LCD 滤镜 -->
    </edit>
  </match>
</fontconfig>
