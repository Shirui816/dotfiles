<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
 <!-- 启用自动微调和抗锯齿 -->
 <match target="font">
  <edit mode="assign" name="antialias">
   <bool>true</bool>
  </edit>
  <edit mode="assign" name="hinting">
   <bool>true</bool>
  </edit>
  <edit mode="assign" name="hintstyle">
   <const>hintslight</const>
  </edit>
  <edit mode="assign" name="rgba">
   <const>rgb</const>
  </edit>
  <edit mode="assign" name="lcdfilter">
   <const>lcddefault</const>
  </edit>
 </match>
 <!-- Windows字体替换规则 -->
 <!-- 设置默认无衬线字体 -->
 <alias>
  <family>sans-serif</family>
  <prefer>
   <family>Arial</family>
   <family>Microsoft YaHei</family>
   <family>Microsoft JhengHei</family>
   <family>Meiryo</family>
   <family>Malgun Gothic</family>
   <family>SimHei</family>
  </prefer>
 </alias>
 <!-- 设置默认衬线字体 -->
 <alias>
  <family>serif</family>
  <prefer>
   <family>Times New Roman</family>
   <family>SimSun</family>
   <family>NSimSun</family>
   <family>MingLiU</family>
   <family>PMingLiU</family>
   <family>MS Mincho</family>
   <family>Batang</family>
  </prefer>
 </alias>
 <!-- 设置默认等宽字体 -->
 <alias>
  <family>monospace</family>
  <prefer>
   <family>Consolas</family>
   <family>Courier New</family>
   <family>NSimSun</family>
   <family>SimSun</family>
   <family>MingLiU</family>
   <family>MS Gothic</family>
   <family>Gulim</family>
  </prefer>
 </alias>
 <!-- 中文字体替换 -->
 <match target="pattern">
  <test compare="contains" name="lang">
   <string>zh</string>
  </test>
  <test name="family">
   <string>sans-serif</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>Microsoft YaHei</string>
  </edit>
 </match>
 <match target="pattern">
  <test compare="contains" name="lang">
   <string>zh</string>
  </test>
  <test name="family">
   <string>serif</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>SimSun</string>
  </edit>
 </match>
 <match target="pattern">
  <test compare="contains" name="lang">
   <string>zh</string>
  </test>
  <test name="family">
   <string>monospace</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>NSimSun</string>
  </edit>
 </match>
 <!-- 日文字体替换 -->
 <match target="pattern">
  <test compare="contains" name="lang">
   <string>ja</string>
  </test>
  <test name="family">
   <string>sans-serif</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>Meiryo</string>
  </edit>
 </match>
 <match target="pattern">
  <test compare="contains" name="lang">
   <string>ja</string>
  </test>
  <test name="family">
   <string>serif</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>MS Mincho</string>
  </edit>
 </match>
 <match target="pattern">
  <test compare="contains" name="lang">
   <string>ja</string>
  </test>
  <test name="family">
   <string>monospace</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>MS Gothic</string>
  </edit>
 </match>
 <!-- 韩文字体替换 -->
 <match target="pattern">
  <test compare="contains" name="lang">
   <string>ko</string>
  </test>
  <test name="family">
   <string>sans-serif</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>Malgun Gothic</string>
  </edit>
 </match>
 <match target="pattern">
  <test compare="contains" name="lang">
   <string>ko</string>
  </test>
  <test name="family">
   <string>serif</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>Batang</string>
  </edit>
 </match>
 <match target="pattern">
  <test compare="contains" name="lang">
   <string>ko</string>
  </test>
  <test name="family">
   <string>monospace</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>Gulim</string>
  </edit>
 </match>
 <!-- 针对终端等宽字体的特殊处理 -->
 <match target="pattern">
  <test name="prgname">
   <string>konsole</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>Consolas</string>
   <string>NSimSun</string>
  </edit>
 </match>
 <!-- 确保终端中文字体渲染一致 -->
 <match target="font">
  <test name="prgname">
   <string>konsole</string>
  </test>
  <test compare="contains" name="lang">
   <string>zh</string>
  </test>
  <edit mode="assign" name="hintstyle">
   <const>hintfull</const>
  </edit>
  <edit mode="assign" name="antialias">
   <bool>true</bool>
  </edit>
  <edit mode="assign" name="autohint">
   <bool>false</bool>
  </edit>
  <edit mode="assign" name="embeddedbitmap">
   <bool>false</bool>
  </edit>
 </match>
 <!-- 为终端中的等宽字体设置更一致的CJK字体回退 -->
 <match target="pattern">
  <test name="family">
   <string>monospace</string>
  </test>
  <test name="prgname">
   <string>konsole</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>NSimSun</string>
  </edit>
 </match>
 <!-- 常见Windows字体别名 -->
 <alias binding="same">
  <family>微软雅黑</family>
  <accept>
   <family>Microsoft YaHei</family>
  </accept>
 </alias>
 <alias binding="same">
  <family>宋体</family>
  <accept>
   <family>SimSun</family>
  </accept>
 </alias>
 <alias binding="same">
  <family>新宋体</family>
  <accept>
   <family>NSimSun</family>
  </accept>
 </alias>
 <alias binding="same">
  <family>黑体</family>
  <accept>
   <family>SimHei</family>
  </accept>
 </alias>
 <alias binding="same">
  <family>仿宋</family>
  <accept>
   <family>FangSong</family>
  </accept>
 </alias>
 <alias binding="same">
  <family>楷体</family>
  <accept>
   <family>KaiTi</family>
  </accept>
 </alias>
 <alias binding="same">
  <family>隶书</family>
  <accept>
   <family>LiSu</family>
  </accept>
 </alias>
 <alias binding="same">
  <family>幼圆</family>
  <accept>
   <family>YouYuan</family>
  </accept>
 </alias>
 <!-- 设置特定字体的渲染参数 -->
 <match target="font">
  <test compare="contains" name="family">
   <string>SimSun</string>
  </test>
  <edit mode="assign" name="embeddedbitmap">
   <bool>false</bool>
  </edit>
 </match>
 <match target="font">
  <test compare="contains" name="family">
   <string>NSimSun</string>
  </test>
  <edit mode="assign" name="embeddedbitmap">
   <bool>false</bool>
  </edit>
  <edit mode="assign" name="hintstyle">
   <const>hintfull</const>
  </edit>
 </match>
 <match target="font">
  <test compare="contains" name="family">
   <string>Microsoft YaHei</string>
  </test>
  <edit mode="assign" name="hintstyle">
   <const>hintslight</const>
  </edit>
 </match>
 <!-- 禁用某些字体的内嵌点阵，以获得更好的渲染效果 -->
 <match target="font">
  <edit mode="assign" name="embeddedbitmap">
   <bool>false</bool>
  </edit>
 </match>
 <!-- 优化中文字体显示 -->
 <match target="font">
  <test compare="contains" name="lang">
   <string>zh</string>
  </test>
  <edit name="spacing">
   <const>proportional</const>
  </edit>
  <edit name="globaladvance">
   <bool>false</bool>
  </edit>
 </match>
 <!-- 优化日文字体显示 -->
 <match target="font">
  <test compare="contains" name="lang">
   <string>ja</string>
  </test>
  <edit name="spacing">
   <const>proportional</const>
  </edit>
  <edit name="globaladvance">
   <bool>false</bool>
  </edit>
 </match>
 <!-- 优化韩文字体显示 -->
 <match target="font">
  <test compare="contains" name="lang">
   <string>ko</string>
  </test>
  <edit name="spacing">
   <const>proportional</const>
  </edit>
  <edit name="globaladvance">
   <bool>false</bool>
  </edit>
 </match>
 <selectfont>
  <rejectfont>
   <glob>/usr/share/fonts/noto/NotoKufi*</glob>
   <glob>/usr/share/fonts/noto/NotoNaskh*</glob>
   <glob>/usr/share/fonts/noto/NotoNastaliq*</glob>
   <glob>/usr/share/fonts/noto/NotoSans*</glob>
   <glob>/usr/share/fonts/noto/NotoSerif*</glob>
  </rejectfont>
  <acceptfont>
   <glob>/usr/share/fonts/noto/NotoSans-Regular.ttf</glob>
   <glob>/usr/share/fonts/noto/NotoSans-Bold.ttf</glob>
   <glob>/usr/share/fonts/noto/NotoSans-BoldItalic.ttf</glob>
   <glob>/usr/share/fonts/noto/NotoSans-Italic.ttf</glob>
   <glob>/usr/share/fonts/noto/NotoSerif-Regular.ttf</glob>
   <glob>/usr/share/fonts/noto/NotoSerif-Bold.ttf</glob>
   <glob>/usr/share/fonts/noto/NotoSerif-BoldItalic.ttf</glob>
   <glob>/usr/share/fonts/noto/NotoSerif-Italic.ttf</glob>
   <glob>/usr/share/fonts/noto/NotoSans-*</glob>
   <glob>/usr/share/fonts/noto/NotoSerif-*</glob>
  </acceptfont>
 </selectfont>
 <dir>~/.local/share/fonts</dir>
</fontconfig>
